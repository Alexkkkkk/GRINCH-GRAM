<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход · GRINCH-GRAM</title>
  <link rel="icon" href="/static/img/grinch-icon.svg">
  <style>
    :root{
      --bg:#080b14; --bg2:#0c1322; --border:#1e2a45; --text:#e2e8f0;
      --text2:#8aa0c6; --grinch:#00ff88; --ton:#0098EA; --red:#ff4d6d;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(0,255,136,0.08), transparent 60%),
        radial-gradient(700px 400px at 50% 110%, rgba(0,152,234,0.08), transparent 60%),
        var(--bg);
      color:var(--text); font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .card{
      width:100%; max-width:380px; background:var(--bg2);
      border:1px solid var(--border); border-radius:16px; padding:32px 28px;
      box-shadow:0 24px 60px rgba(0,0,0,0.5);
    }
    .brand{display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px}
    .brand img{width:36px; height:36px}
    .brand h1{
      font-size:22px; font-weight:700; letter-spacing:.5px;
      background:linear-gradient(90deg,var(--ton),var(--grinch));
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    .sub{text-align:center; color:var(--text2); font-size:13px; margin-bottom:24px}
    label{display:block; font-size:12px; color:var(--text2); margin:14px 0 6px}
    input{
      width:100%; padding:12px 14px; background:#0a1020; color:var(--text);
      border:1px solid var(--border); border-radius:10px; font-size:15px; outline:none;
      transition:border-color .15s;
    }
    input:focus{border-color:var(--grinch)}
    .btn{
      width:100%; margin-top:22px; padding:13px; border:none; border-radius:10px;
      background:linear-gradient(135deg,#00d4aa,#00ff88); color:#001b12;
      font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s;
    }
    .btn:hover{opacity:.9}
    .err{
      margin-top:16px; padding:10px 12px; border-radius:8px; font-size:13px;
      background:rgba(255,77,109,0.1); border:1px solid rgba(255,77,109,0.3);
      color:var(--red); text-align:center;
    }
    .foot{margin-top:22px; text-align:center; color:#5a6b8c; font-size:11px}
  </style>
</head>
<body>
  <form class="card" method="POST" action="/login{% if next %}?next={{ next }}{% endif %}">
    <div class="brand">
      <img src="/static/img/grinch-icon.svg" alt="">
      <h1>GRINCH-GRAM</h1>
    </div>
    <p class="sub">Вход в панель управления</p>

    <label for="username">Логин</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus required>

    <label for="password">Пароль</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <button class="btn" type="submit">Войти</button>
    <p class="foot">Доступ только для владельца платформы</p>
  </form>
</body>
</html>
