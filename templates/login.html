<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход · GRINCH-GRAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #020406;
      --card:   #060c14;
      --emerald: #00c96a;
      --emerald2: #00a855;
      --cyan:   #00d4f0;
      --ton:    #0088cc;
      --red:    #e8334a;
      --text:   #dde5f0;
      --text2:  #5a7090;
      --text3:  #2d3d52;
      --border: rgba(255,255,255,.06);
      --border-c: rgba(0,212,240,.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Фоновые слои */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 20% 15%, rgba(0,152,204,.06) 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 80% 85%, rgba(0,201,106,.05) 0%, transparent 55%),
        radial-gradient(ellipse 45% 35% at 75% 10%, rgba(100,40,200,.04) 0%, transparent 50%);
    }

    /* Тонкая сетка */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,212,240,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,240,.018) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    /* Орбитальные кольца */
    .orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .orb {
      position: absolute; border-radius: 50%;
      border: 1px solid; animation: orb-spin linear infinite;
    }
    .orb-1 {
      width: 480px; height: 480px;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      border-color: rgba(0,212,240,.04);
      animation-duration: 50s;
    }
    .orb-2 {
      width: 320px; height: 320px;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      border-color: rgba(0,201,106,.035);
      animation-duration: 35s; animation-direction: reverse;
    }
    .orb-3 {
      width: 180px; height: 180px;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      border-color: rgba(100,40,200,.045);
      animation-duration: 22s;
    }
    @keyframes orb-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }

    /* Карточка */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: rgba(6,12,20,.92);
      border: 1px solid rgba(0,212,240,.1);
      border-radius: 22px;
      padding: 44px 40px 38px;
      backdrop-filter: blur(32px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.025),
        0 40px 100px rgba(0,0,0,.7),
        0 0 80px rgba(0,136,200,.04);
    }
    /* Верхний световой бортик */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,240,.35), transparent);
    }
    /* Нижний слабый световой штрих */
    .login-card::after {
      content: '';
      position: absolute; bottom: 0; left: 25%; right: 25%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,201,106,.15), transparent);
    }

    /* Бренд */
    .brand {
      display: flex; align-items: center; gap: 13px;
      justify-content: center; margin-bottom: 6px;
    }
    .brand-icon {
      font-size: 34px;
      filter: drop-shadow(0 0 18px rgba(0,201,106,.45));
    }
    .brand-name {
      font-size: 25px; font-weight: 900; letter-spacing: .07em;
      background: linear-gradient(130deg, #00d4f0 0%, #00c96a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      text-align: center; color: var(--text3); font-size: 12px;
      margin-bottom: 30px; letter-spacing: .015em; line-height: 1.5;
    }

    /* Статус-чип */
    .status-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; border-radius: 100px;
      background: rgba(0,201,106,.05); border: 1px solid rgba(0,201,106,.14);
      margin: 0 auto 30px; width: fit-content;
      font-size: 10.5px; font-weight: 700; color: #00b85f;
      text-transform: uppercase; letter-spacing: .07em;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00c96a; box-shadow: 0 0 7px #00c96a;
      animation: dot-pulse 1.8s ease-in-out infinite;
    }
    @keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.55)} }

    /* Разделитель */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      margin-bottom: 26px;
    }

    /* Поля */
    .field { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 10px; font-weight: 700;
      color: var(--text2); text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    .field-input {
      width: 100%; padding: 13px 16px 13px 42px;
      background: rgba(255,255,255,.035);
      color: var(--text); font-size: 14px; font-weight: 500;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .field-input:focus {
      background: rgba(0,212,240,.04);
      border-color: rgba(0,212,240,.32);
      box-shadow: 0 0 0 3px rgba(0,212,240,.07);
    }
    .field-input::placeholder { color: var(--text3); }

    /* Кнопка входа */
    .login-btn {
      width: 100%; margin-top: 6px; padding: 15px;
      background: linear-gradient(130deg, #00a855 0%, #00c96a 100%);
      color: #001a0d; font-size: 13.5px; font-weight: 900;
      letter-spacing: .055em; text-transform: uppercase;
      border: none; border-radius: 13px; cursor: pointer;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      position: relative; overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,168,85,.22), 0 2px 8px rgba(0,0,0,.4);
    }
    .login-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.12), transparent);
      pointer-events: none;
    }
    .login-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(0,168,85,.38), 0 4px 12px rgba(0,0,0,.4);
    }
    .login-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 14px rgba(0,168,85,.18);
    }
    .login-btn-inner { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* Ошибка */
    .error-msg {
      margin-top: 14px; padding: 11px 15px; border-radius: 10px;
      background: rgba(232,51,74,.07); border: 1px solid rgba(232,51,74,.22);
      color: var(--red); font-size: 12px; text-align: center; font-weight: 600;
    }

    /* Плашки снизу */
    .tech-tags {
      display: flex; gap: 6px; justify-content: center; margin-top: 24px; flex-wrap: wrap;
    }
    .tech-tag {
      padding: 4px 11px; border-radius: 100px; font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .055em;
      border: 1px solid;
    }
    .tt-ton    { background: rgba(0,136,204,.07); border-color: rgba(0,136,204,.18); color: #2aa7e8; }
    .tt-ai     { background: rgba(110,45,210,.07); border-color: rgba(110,45,210,.18); color: #9b72f5; }
    .tt-dedust { background: rgba(0,201,106,.05); border-color: rgba(0,201,106,.15); color: #00b05d; }

    /* Футер */
    .login-footer {
      margin-top: 16px; text-align: center;
      color: var(--text3); font-size: 10px; letter-spacing: .03em;
    }

    @media (max-width: 480px) {
      .login-card { padding: 30px 22px 28px; border-radius: 18px; }
      .brand-name { font-size: 21px; }
      .field-input { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <form class="login-card" method="POST" action="/login{% if next %}?next={{ next }}{% endif %}">
    <div class="brand">
      <span class="brand-icon">🐸</span>
      <span class="brand-name">GRINCH-GRAM</span>
    </div>
    <p class="brand-sub">Торговый агент TON × GRINCH · DeDust DEX</p>

    <div class="status-chip">
      <span class="status-dot"></span>
      AI работает · Авто-режим
    </div>

    <div class="divider"></div>

    <div class="field">
      <label class="field-label" for="username">Логин</label>
      <div class="field-wrap">
        <span class="field-icon">👤</span>
        <input class="field-input" id="username" name="username"
          type="text" autocomplete="username" autofocus required
          placeholder="Введите логин">
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="password">Пароль</label>
      <div class="field-wrap">
        <span class="field-icon">🔑</span>
        <input class="field-input" id="password" name="password"
          type="password" autocomplete="current-password" required
          placeholder="••••••••">
      </div>
    </div>

    {% if error %}<div class="error-msg">⚠ {{ error }}</div>{% endif %}

    <button class="login-btn" type="submit">
      <span class="login-btn-inner">▶ Войти в панель</span>
    </button>

    <div class="tech-tags">
      <span class="tech-tag tt-ton">◆ TON Blockchain</span>
      <span class="tech-tag tt-ai">🧠 AI · 6 моделей</span>
      <span class="tech-tag tt-dedust">🐸 DeDust DEX</span>
    </div>

    <p class="login-footer">Доступ только для владельца платформы</p>
  </form>
</body>
</html>
