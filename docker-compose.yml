version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      - bot_data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot_data:
